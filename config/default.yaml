# Personal Agent CLI - Default Configuration
# Copy this to ~/.personalagent/config.yaml and customize

# API Keys (use environment variables for security)
apiKeys:
  gemini: ${GEMINI_API_KEY}
  openai: ${OPENAI_API_KEY}
  anthropic: ${ANTHROPIC_API_KEY}
  tavily: ${TAVILY_API_KEY}

# Provider Configuration
providers:
  default: gemini
  
  gemini:
    model: gemini-2.5-flash
    models:
      - gemini-3-pro-preview
      - gemini-3-flash-preview
      - gemini-2.5-flash
      - gemini-2.5-pro
      - gemini-2.0-flash
    temperature: 0.7
    maxTokens: 8192
    
  openai:
    model: gpt-4o
    models:
      - gpt-4o
      - gpt-4o-mini
      - o1
      - o3-mini
    temperature: 0.7
    maxTokens: 4096
    
  anthropic:
    model: claude-sonnet-4-20250514
    models:
      - claude-sonnet-4-20250514
      - claude-opus-4-20250514
    temperature: 0.7
    maxTokens: 8192
    
  ollama:
    model: llama3
    models:
      - llama3
      - mistral
      - codellama
      - deepseek-coder
    host: http://localhost:11434
    temperature: 0.7

# Hive Architecture Settings
hive:
  queen:
    provider: gemini
    model: gemini-3-pro-preview    # Use more capable model for orchestration
    systemPrompt: null
    
  worker:
    provider: gemini
    model: gemini-3-flash-preview  # Use faster model for task execution
    maxConcurrent: 4
    timeout: 300000
    
  ralphLoop:
    maxIterations: 10
    verificationStrategy: auto
    dimensional:
      enabled: true
      convergenceThreshold: 0.05
      passingScore: 0.8
      stagnationWindow: 2
      observationMasking: true
      maxMaskedOutputLength: 200
      reflexionEnabled: true

  # Adaptive replanning: when workers fail, Queen can revise the plan mid-flight
  replanning:
    enabled: false    # opt-in — set to true to enable adaptive replanning
    maxReplans: 1     # max replan attempts per request (conservative default)

  # Evaluator-Optimizer loop: after aggregation, evaluates result quality and
  # triggers targeted re-execution if gaps are found
  evaluation:
    enabled: false         # opt-in — set to true to enable post-aggregation evaluation
    maxCycles: 2           # max evaluation cycles per request (1-5)
    passingThreshold: 0.7  # minimum score (0.0-1.0) to pass evaluation

  # Progressive Discovery: multi-wave investigative execution for research tasks
  progressiveDiscovery:
    enabled: false         # opt-in — set to true to enable multi-wave discovery
    maxWaves: 4            # maximum investigation waves per request
    waveTimeout: 120000    # per-wave timeout in ms (2 minutes)
    totalTimeout: 600000   # all waves combined in ms (10 minutes)
    stoppingThreshold: 2   # minimum new findings per wave to suggest continuing

# Skills Configuration
skills:
  enabled: true
  paths:
    - ./skills
    - ~/.personalagent/skills
  autoDiscover: true
  
# MCP Server Settings
mcp:
  enabled: true
  tools:
    fileSystem: true
    webSearch: false
    codeExecution: true
    shellExecution:
      enabled: true
      defaultTimeout: 30000
      maxTimeout: 300000
      blockedPatterns: []
      maxOutputLength: 50000
  sandbox: true
  servers:
    - name: google-search
      transport: stdio
      command: npx
      args: ["-y", "g-search-mcp@latest"]
      enabled: true
      timeout: 120000
      namespace: false

# CLI Preferences
cli:
  theme: auto
  showWorkerStatus: true
  streamResponses: true
  historyFile: ~/.personalagent/history.json
  maxHistorySize: 1000

# Logging & Debug
logging:
  level: info
  file: ~/.personalagent/logs/agent.log
  includeTokenUsage: true
